<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINZZY ❖ Channel Page</title>

<link rel="shortcut icon" href="Kinnzy.jpg" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins',sans-serif; }

/* 🌌 Dark gradient background */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1b1b1b, #2c2c2c, #3C6F84);
  background-size: 300% 300%;
  animation: gradientMove 12s ease infinite;
  padding: 20px;
  color: #eee;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* CARD */
.card {
  background: rgba(30,30,30,0.7);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 25px;
  width: 100%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.4s;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* PROFILE */
.profile-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #3C6F84;
}

h2 { font-size: 20px; margin: 8px 0; color: #fff; }
p { font-size: 14px; color: #ccc; }

/* LINKS */
.links {
  margin-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* BUTTONS */
.btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  font-size: 14px;
  font-weight: 500;
  background: linear-gradient(135deg, #3C6F84, #5fa3bd);
  box-shadow: 0 8px 20px rgba(60, 111, 132, 0.5);
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* ICON */
.btn img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  padding: 4px;
  background: #fff;
  object-fit: cover;
  transition: all 0.3s ease;
}

/* SHINE HOVER EFFECT */
.btn::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  top: 0;
  left: -120%;
  transition: 0.5s;
}
.btn:hover::before { left: 100%; }
.created_by{
  text-decoration: none;
  color: #3C6F84;
}

/* HOVER LIFT */
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(60, 111, 132, 0.6);
}

/* MOBILE */
@media (max-width: 480px) {
  .card { padding: 20px; border-radius: 20px; }
  h2 { font-size: 18px; }
  p { font-size: 13px; }
  .btn { font-size: 13px; padding: 10px 14px; }
  .btn img { width: 22px; height: 22px; }
}

/* TABLET */
@media (min-width: 481px) and (max-width: 768px) {
  .card { max-width: 380px; padding: 28px; }
  h2 { font-size: 22px; }
}

/* DESKTOP */
@media (min-width: 769px) { .card { max-width: 400px; } }

</style>
</head>

<body>

<div class="card">
  <img src="Kinnzy.jpg" alt="Profile" class="profile-img">
  <h2>KINZZY ❖</h2>
  <p>Follow My Channels</p>

  <div class="links">
    <a href="https://t.me/Kinzzy223" target="_blank" class="btn">
      <img src="Telegram.png" alt="Telegram">
      Telegram Account
    </a>
    <a href="https://t.me/kinzzy_file223" target="_blank" class="btn">
      <img src="./Telegram.png" alt="Telegram">
      Telegram Channel
    </a>
    <a href="https://www.tiktok.com/@kinzzy_still_lonely" target="_blank" class="btn">
      <img src="./Tiktok.png" alt="TikTok">
      TikTok
    </a>
  </div>
  <br>
  <a href="" class="created_by">Create By @kinnzy</a>
</div>

</body>
</html>
